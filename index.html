<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>가계부 및 달력 지출 관리</title>
    <!-- Tailwind CSS CDN (최신 버전) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Day.js 라이브러리 -->
    <script src="https://cdn.jsdelivr.net/npm/dayjs@1.11.10/dayjs.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dayjs@1.11.10/locale/ko.js"></script>
    <script>dayjs.locale('ko');</script>

    <!-- Firebase 연결 스크립트 -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, onSnapshot, doc, deleteDoc, query, addDoc, setDoc, updateDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        
        // --- 고객님의 Firebase Config ---
        const firebaseConfig = {
             apiKey: "AIzaSyCzzQo4-qQZBSHx8TNy7akr8yho8KkJaSQ",
             authDomain: "joseph-home.firebaseapp.com",
             projectId: "joseph-home",
             storageBucket: "joseph-home.firebasestorage.app",
             messagingSenderId: "378047604301",
             appId: "1:378047604301:web:77c26733ed7a23334691e04",
             measurementId: "G-3VY6X5STKP"
        }; 
        
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        // --- 데이터 경로 상수 ---
        const LEGACY_ENTRIES_PATH = `ledger_entries`;
        const LEGACY_CATEGORIES_PATH = `user_settings/categories`;
        
        const USER_BASE_COLLECTION = `users`; 
        const ENTRIES_COLLECTION_NAME = `ledger_entries`;
        const CATEGORIES_COLLECTION_NAME = `settings`;
        const CATEGORIES_DOC_NAME = `categories`;

        const DEFAULT_CATEGORIES = ['식사', '유흥', '쇼핑', '월정액', '기타']; 

        // 전역 변수로 Firebase 함수 노출 (HTML 이벤트 핸들러용)
        window.db = db;
        window.collection = collection;
        window.addDoc = addDoc;
        window.doc = doc;
        window.deleteDoc = deleteDoc;
        window.setDoc = setDoc;
        window.updateDoc = updateDoc;
        
        // 앱 초기화 및 데이터 동기화 시작
        window.initApp = async () => {
            try {
                // UID 고정 로직: localStorage에서 UID를 확인하고 없으면 새로 생성하여 고정
                let fixedUserId = localStorage.getItem('fixedUserId');
                if (!fixedUserId) {
                    // 익명 로그인 시도 후 UID 저장
                    const userCredential = await signInAnonymously(auth);
                    fixedUserId = userCredential.user.uid;
                    localStorage.setItem('fixedUserId', fixedUserId);
                } else {
                    // 고정된 UID로 재인증 (실제로는 작동하지 않지만 상태 유지를 위함)
                    // 여기서는 단순히 상태 유지를 위해 다시 시도하지 않습니다.
                }

                const userId = fixedUserId;
                const userIdDisplay = document.getElementById('user-id');
                if (userIdDisplay) userIdDisplay.textContent = userId;
                
                // 사용자별 경로 설정
                window.currentUserEntriesPath = `${USER_BASE_COLLECTION}/${userId}/${ENTRIES_COLLECTION_NAME}`;
                window.currentUserSettingsPath = `${USER_BASE_COLLECTION}/${userId}/${CATEGORIES_COLLECTION_NAME}`;
                window.currentUserId = userId;

                startDataSync(userId);
            } catch (error) {
                console.error("Firebase Init Error:", error);
                const syncStatusDisplay = document.getElementById('sync-status');
                if (syncStatusDisplay) {
                    syncStatusDisplay.textContent = '연결 실패';
                    syncStatusDisplay.className = 'font-medium text-red-500';
                }
            }
        };

        function startDataSync(userId) {
            // 1. 카테고리 로드 (개인 -> 없으면 공유 -> 없으면 기본)
            const userCatRef = doc(db, window.currentUserSettingsPath, CATEGORIES_DOC_NAME);
            const legacyCatRef = doc(db, LEGACY_CATEGORIES_PATH);

            onSnapshot(userCatRef, (docSnap) => {
                if (docSnap.exists() && docSnap.data().names) {
                    window.categoryNames = docSnap.data().names;
                    updateCategoryUI();
                } else {
                    // 개인 카테고리가 없으면 공유 카테고리 확인
                    onSnapshot(legacyCatRef, (sharedSnap) => {
                        let initialCats = DEFAULT_CATEGORIES;
                        if (sharedSnap.exists() && sharedSnap.data().names) {
                            initialCats = sharedSnap.data().names;
                        }
                        // 확인된 카테고리를 개인 경로에 저장 (초기화)
                        setDoc(userCatRef, { names: initialCats, userId: userId }, { merge: true });
                    });
                }
            });

            // 2. 지출 데이터 로드 (개인 + 공유 병합 표시)
            const userQuery = query(collection(db, window.currentUserEntriesPath));
            const sharedQuery = query(collection(db, LEGACY_ENTRIES_PATH));

            let userData = [];
            let sharedData = [];

            const mergeAndRender = () => {
                // 두 데이터를 합쳐서 날짜순 정렬
                window.allLedgerData = [...sharedData, ...userData];
                
                // 중복 제거 (ID 기준)
                window.allLedgerData = window.allLedgerData.filter((v, i, a) => a.findIndex(t => (t.id === v.id)) === i);

                renderCalendar();
                document.getElementById('sync-status').textContent = '동기화 완료';
                document.getElementById('sync-status').className = 'font-medium text-green-400';
                document.getElementById('submit-btn').disabled = false;
            };

            onSnapshot(userQuery, (snapshot) => {
                userData = snapshot.docs.map(d => ({ id: d.id, ...d.data(), isPersonal: true }));
                mergeAndRender();
            });

            onSnapshot(sharedQuery, (snapshot) => {
                // isPersonal: false 인 경우 공유 데이터이므로 삭제 시 공유 경로 사용
                // ⚠️ 중요: 여기서 고객님의 UID와 일치하는 항목만 필터링합니다. 
                const customerId = 'ipwIkCmnhFTfWl4BwgHaskv6nBQ2'; // 고객님의 UID (고정)
                sharedData = snapshot.docs
                    .filter(doc => doc.data().userId === customerId) // UID가 일치하는 항목만 필터링
                    .map(d => ({ id: d.id, ...d.data(), isPersonal: false })); // isPersonal: false로 설정

                mergeAndRender();
            });
        }

        window.updateCategoryUI = () => {
            const options = window.categoryNames.map(n => `<option value="${n}">${n}</option>`).join('');
            const def = '<option value="" disabled selected>-- 선택 --</option>';
            document.getElementById('gl-category').innerHTML = def + options;
            document.getElementById('modal-gl-category').innerHTML = def + options;
            renderCategoryManagementList();
        };

        // --- 렌더링 로직 ---
        window.renderCalendar = () => {
            // ✅ 수정: currentCalendarDate가 유효한지 확인하고, 유효하지 않으면 dayjs()로 초기화
            if (!window.currentCalendarDate || !window.currentCalendarDate.format) {
                window.currentCalendarDate = dayjs();
            }

            const displayMonth = window.currentCalendarDate.format('YYYY-MM');
            document.getElementById('current-month-display').textContent = window.currentCalendarDate.format('YYYY년 M월');

            const monthlyData = window.allLedgerData.filter(d => d.date && d.date.startsWith(displayMonth));
            
            // 카테고리별 집계
            window.categories = {};
            window.categoryNames.forEach(n => window.categories[n] = []);
            monthlyData.forEach(d => {
                if (!window.categories[d.category]) window.categories[d.category] = [];
                window.categories[d.category].push(d);
            });
            
            // 사이드바 렌더링
            const sidebar = document.getElementById('category-container-sidebar');
            sidebar.innerHTML = '';
            let totalMonthSum = 0;

            const sidebarContents = window.categoryNames.map(name => {
                const items = window.categories[name] || [];
                const sum = items.reduce((acc, cur) => acc + (Number(cur.amount) || 0), 0);
                totalMonthSum += sum;

                return `
                    <div class="p-3 border rounded-lg flex justify-between items-center bg-white hover:bg-indigo-50 cursor-pointer transition" onclick="showCategoryDetail('${name}', window.categories['${name}'] || [])">
                        <span class="font-medium text-gray-700">${name} <small class="font-normal text-gray-500">(${items.length})</small></span>
                        <span class="font-bold text-indigo-600">${sum.toLocaleString()}원</span>
                    </div>
                `;
            }).join('');
            
            sidebar.innerHTML = sidebarContents;
            document.getElementById('total-sum').textContent = `${totalMonthSum.toLocaleString()} 원`;
            window.renderLedgerList(monthlyData);

            // 달력 그리기
            const calendarDays = document.getElementById('calendar-days');
            calendarDays.innerHTML = '';
            const startOfMonth = window.currentCalendarDate.startOf('month');
            const endOfMonth = window.currentCalendarDate.endOf('month');
            const startDay = startOfMonth.day();
            const daysInMonth = window.currentCalendarDate.daysInMonth();

            // 빈 칸
            for(let i=0; i<startDay; i++) {
                calendarDays.innerHTML += `<div class="day-cell empty-cell"></div>`;
            }
            // 날짜 칸
            for(let i=1; i<=daysInMonth; i++) {
                const dateStr = window.currentCalendarDate.date(i).format('YYYY-MM-DD');
                const dayData = window.allLedgerData.filter(d => d.date === dateStr);
                const daySum = dayData.reduce((acc, cur) => acc + (Number(cur.amount)||0), 0);
                
                const div = document.createElement('div');
                div.className = `day-cell ${dateStr === dayjs().format('YYYY-MM-DD') ? 'is-today' : ''}`;
                div.innerHTML = `<div class="date-number">${i}</div>` + (daySum > 0 ? `<div class="total-amount">${daySum.toLocaleString()}</div>` : '');
                div.onclick = () => openDayModal(dateStr, dayData);
                calendarDays.appendChild(div);
            }
        }

        window.renderLedgerList = (data) => {
            const list = document.getElementById('general-ledger-list');
            list.innerHTML = '';
            data.sort((a,b) => new Date(b.date) - new Date(a.date));
            data.forEach(d => {
                const li = document.createElement('li');
                li.className = 'flex justify-between p-2 bg-gray-50 rounded border';
                const deleteButton = `<button class="text-gray-400 hover:text-red-500" onclick="deleteEntry('${d.id}', ${d.isPersonal})">×</button>`;
                li.innerHTML = `
                    <div><span class="text-xs text-indigo-500 mr-2">${d.category}</span><span class="text-sm">${d.item}</span> <span class="text-xs text-gray-400">(${d.date.slice(5)})</span></div>
                    <div class="flex items-center"><span class="font-bold text-red-500 mr-2">${Number(d.amount).toLocaleString()}</span>${deleteButton}</div>
                `;
                list.appendChild(li);
            });
        }

        // --- 모달/삭제/이동 로직 ---
        window.openDayModal = (date, data) => {
            document.getElementById('modal-date-title').textContent = date;
            document.getElementById('modal-gl-date').value = date;
            const list = document.getElementById('modal-detail-list');
            list.innerHTML = '';
            let sum = 0;
            data.forEach(d => {
                sum += Number(d.amount);
                const deleteButton = `<button onclick="deleteEntry('${d.id}', ${d.isPersonal})" class="ml-2 text-gray-400 hover:text-red-600">×</button>`;
                list.innerHTML += `<li class="flex justify-between p-2 border-b"><span>${d.item} <small class="text-gray-500">(${d.category})</small></span><span><b class="text-red-500">${Number(d.amount).toLocaleString()}</b> ${deleteButton}</span></li>`;
            });
            document.getElementById('modal-total-sum').textContent = `합계: ${sum.toLocaleString()} 원`;
            
            document.getElementById('modal-backdrop').classList.remove('hidden');
            document.getElementById('modal-backdrop').classList.add('flex');
        };

        window.deleteEntry = async (id, isPersonal) => {
            if(!confirm('삭제하시겠습니까?')) return;
            // isPersonal이 true면 개인 경로, false면 공유 경로 (복구된 데이터)
            const collectionName = isPersonal !== false ? 
                `${window.moduleExports.USER_BASE_COLLECTION}/${window.currentUserId}/${window.moduleExports.ENTRIES_COLLECTION_NAME}` : 
                window.moduleExports.LEGACY_ENTRIES_PATH;
            try {
                await window.deleteDoc(window.doc(db, collectionName, id));
            } catch(e) { console.error(e); alert('삭제 실패'); }
        };

        window.openCategoryManager = () => {
             window.renderCategoryManagementList();
             document.getElementById('category-management-ui').style.display = 'block';
             document.getElementById('category-detail-view').style.display = 'none';
             document.getElementById('category-modal-backdrop').classList.remove('hidden'); 
             document.getElementById('category-modal-backdrop').classList.add('flex');
        };

        window.renderCategoryManagementList = () => {
            const list = document.getElementById('existing-categories-list');
            list.innerHTML = window.categoryNames.map(n => 
                `<div class="flex justify-between p-2 border-b bg-white"><span>${n}</span> <div><button onclick="modCat('${n}')" class="text-blue-500 mr-2 text-xs font-bold">수정</button><button onclick="delCat('${n}')" class="text-red-500 text-xs font-bold">삭제</button></div></div>`
            ).join('');
        };

        window.showCategoryDetail = (name, data) => {
            const list = document.getElementById('category-detail-list');
            list.innerHTML = data.map(d => `<li class="flex justify-between p-2 border-b"><span>${d.date} ${d.item}</span><span class="font-bold">${Number(d.amount).toLocaleString()}</span></li>`).join('');
            
            document.getElementById('category-management-ui').style.display = 'none';
            document.getElementById('category-detail-view').style.display = 'block';
            document.getElementById('category-modal-backdrop').classList.remove('hidden'); 
            document.getElementById('category-modal-backdrop').classList.add('flex');
        };

        window.closeModal = () => {
            document.getElementById('modal-backdrop').classList.add('hidden');
            document.getElementById('modal-backdrop').classList.remove('flex');
        };
        
        window.closeCategoryModal = () => {
            document.getElementById('category-modal-backdrop').classList.add('hidden');
            document.getElementById('category-modal-backdrop').classList.remove('flex');
        };

        window.addEntry = async (data) => {
            const path = `${window.moduleExports.USER_BASE_COLLECTION}/${window.currentUserId}/${window.moduleExports.ENTRIES_COLLECTION_NAME}`;
            try {
                await window.addDoc(window.collection(db, path), { ...data, userId: window.currentUserId, timestamp: new Date().toISOString() });
            } catch(e) { console.error(e); alert('저장 실패'); }
        }

        // --- 데이터 조작 (카테고리) ---
        window.modCat = async (oldName) => {
            const newName = prompt('새 이름:', oldName);
            if(newName && newName !== oldName) {
                 alert('카테고리 수정은 현재 카테고리 데이터 일관성 유지를 위해 지원되지 않습니다. 삭제 후 다시 추가해주세요.');
            }
        }
        window.delCat = async (name) => {
            if(confirm('삭제하시겠습니까?')) {
                 const USER_SETTINGS_PATH = `${window.moduleExports.USER_BASE_COLLECTION}/${window.currentUserId}/${window.moduleExports.CATEGORIES_COLLECTION_NAME}`;
                 const newCats = window.categoryNames.filter(n => n !== name);
                 await window.setDoc(window.doc(db, USER_SETTINGS_PATH, window.moduleExports.CATEGORIES_DOC_NAME), { names: newCats, userId: window.currentUserId });
            }
        }

        // --- 이벤트 핸들러 ---
        document.addEventListener('DOMContentLoaded', () => {
            // 메인 폼
            const glForm = document.getElementById('general-ledger-form');
            if (glForm) {
                glForm.onsubmit = (e) => {
                    e.preventDefault();
                    const date = document.getElementById('gl-date').value;
                    const cat = document.getElementById('gl-category').value;
                    const item = document.getElementById('gl-item').value;
                    const amount = document.getElementById('gl-amount').value;
                    if(date && cat && item && amount) {
                        window.addEntry({ date, category: cat, item, amount: Number(amount) });
                        e.target.reset();
                        document.getElementById('gl-date').value = dayjs().format('YYYY-MM-DD');
                    }
                };
            }

            // 모달 폼
            const modalLedgerForm = document.getElementById('modal-ledger-form');
            if (modalLedgerForm) {
                modalLedgerForm.onsubmit = (e) => {
                    e.preventDefault();
                    const date = document.getElementById('modal-gl-date').value;
                    const cat = document.getElementById('modal-gl-category').value;
                    const item = document.getElementById('modal-gl-item').value;
                    const amount = document.getElementById('modal-gl-amount').value;
                    if(date && cat && item && amount) {
                        window.addEntry({ date, category: cat, item, amount: Number(amount) });
                        e.target.reset();
                        window.closeModal();
                    }
                };
            }

            // 카테고리 추가 폼
            const addCategoryForm = document.getElementById('add-category-form');
            if (addCategoryForm) {
                addCategoryForm.onsubmit = async (e) => {
                    e.preventDefault();
                    const val = document.getElementById('new-category-name').value.trim();
                    if(val && !window.categoryNames.includes(val)) {
                        const USER_SETTINGS_PATH = `${window.moduleExports.USER_BASE_COLLECTION}/${window.currentUserId}/${window.moduleExports.CATEGORIES_COLLECTION_NAME}`;
                        const newCats = [...window.categoryNames, val];
                        await window.setDoc(window.doc(db, USER_SETTINGS_PATH, window.moduleExports.CATEGORIES_DOC_NAME), { names: newCats, userId: window.currentUserId });
                        document.getElementById('new-category-name').value = '';
                    }
                };
            }

            // 날짜 이동 버튼 이벤트 리스너 설정
            const prevBtn = document.getElementById('prev-month-btn');
            const nextBtn = document.getElementById('next-month-btn');
            const glDateInput = document.getElementById('gl-date');
            
            if (prevBtn) prevBtn.onclick = () => { window.currentCalendarDate = window.currentCalendarDate.subtract(1, 'month'); window.renderCalendar(); };
            if (nextBtn) nextBtn.onclick = () => { window.currentCalendarDate = window.currentCalendarDate.add(1, 'month'); window.renderCalendar(); };

            // 초기 날짜 설정
            if (glDateInput) glDateInput.value = dayjs().format('YYYY-MM-DD');

            // 앱의 비동기 초기화 시작
            window.initApp();
        });
    </script>
</body>
</html>
