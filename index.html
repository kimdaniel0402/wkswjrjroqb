<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>우리 가족 가계부 (실시간 공유)</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Day.js 라이브러리 -->
    <script src="https://cdn.jsdelivr.net/npm/dayjs@1.11.10/dayjs.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dayjs@1.11.10/locale/ko.js"></script>
    <script>dayjs.locale('ko');</script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, onSnapshot, doc, deleteDoc, query, addDoc, setDoc, updateDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        
        // --- Firebase Config (household-ledger-app) ---
        const firebaseConfig = {
             apiKey: "AIzaSyDibLptsmjCAKK5vziL4VFMN_txxqptmns",
             authDomain: "household-ledger-app.firebaseapp.com",
             projectId: "household-ledger-app",
             storageBucket: "household-ledger-app.firebasestorage.app",
             messagingSenderId: "716953028331",
             appId: "1:716953028331:web:c8c191edfd5235a3d460ae",
             measurementId: "G-9SZG3VCB19"
        }; 
        
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        // 가족 공유를 위한 고정 데이터 경로
        const SHARED_ENTRIES_PATH = `ledger_entries`; 
        const SHARED_SETTINGS_PATH = `settings/categories`; 

        const DEFAULT_CATEGORIES = [
            { name: '식사', isTemp: false, month: '' },
            { name: '유흥', isTemp: false, month: '' },
            { name: '쇼핑', isTemp: false, month: '' },
            { name: '월정액', isTemp: false, month: '' },
            { name: '기타', isTemp: false, month: '' }
        ]; 

        // 전역 객체 초기화 및 노출
        window.db = db;
        window.collection = collection;
        window.addDoc = addDoc;
        window.doc = doc;
        window.deleteDoc = deleteDoc;
        window.setDoc = setDoc;
        window.updateDoc = updateDoc;
        window.SHARED_ENTRIES_PATH = SHARED_ENTRIES_PATH;
        window.SHARED_SETTINGS_PATH = SHARED_SETTINGS_PATH;
        
        window.currentCalendarDate = dayjs();
        window.visibleCategories = [];
        window.allLedgerData = [];
        window.categoryList = [];

        // 앱 초기화 및 데이터 동기화
        window.initApp = async () => {
            try {
                await signInAnonymously(auth);
                const userIdDisplay = document.getElementById('user-id');
                if (userIdDisplay) userIdDisplay.textContent = "가족 공유 모드";
                startDataSync();
            } catch (error) {
                console.error("Firebase Init Error:", error);
            }
        };

        function startDataSync() {
            const settingsRef = doc(db, SHARED_SETTINGS_PATH);
            onSnapshot(settingsRef, (docSnap) => {
                if (docSnap.exists() && docSnap.data().list) {
                    window.categoryList = docSnap.data().list;
                } else {
                    window.categoryList = DEFAULT_CATEGORIES;
                    setDoc(settingsRef, { list: DEFAULT_CATEGORIES }, { merge: true });
                }
                window.updateCategoryUI();
            });

            const entriesRef = collection(db, SHARED_ENTRIES_PATH);
            onSnapshot(query(entriesRef), (snapshot) => {
                window.allLedgerData = [];
                snapshot.forEach(doc => {
                    window.allLedgerData.push({ id: doc.id, ...doc.data() });
                });
                window.renderCalendar();
                const statusEl = document.getElementById('sync-status');
                const btnEl = document.getElementById('submit-btn');
                if(statusEl) {
                    statusEl.textContent = '● 실시간 동기화 중';
                    statusEl.className = 'text-yellow-400 font-bold';
                }
                if(btnEl) btnEl.disabled = false;
            });
        }

        window.updateCategoryUI = () => {
            const glCategory = document.getElementById('gl-category');
            const modalGlCategory = document.getElementById('modal-gl-category');
            const editGlCategory = document.getElementById('edit-gl-category');
            
            if (!window.categoryList || window.categoryList.length === 0) window.categoryList = DEFAULT_CATEGORIES;
            if (!window.currentCalendarDate) window.currentCalendarDate = dayjs();
            
            const currentMonth = window.currentCalendarDate.format('YYYY-MM');
            
            window.visibleCategories = window.categoryList.filter(cat => {
                if (!cat.isTemp) return true;
                return cat.month === currentMonth;
            });

            const options = window.visibleCategories.map(cat => 
                `<option value="${cat.name}">${cat.name}</option>`
            ).join('');

            const def = '<option value="" disabled selected>-- 선택 --</option>';
            if (glCategory) glCategory.innerHTML = def + options;
            if (modalGlCategory) modalGlCategory.innerHTML = def + options;
            if (editGlCategory) editGlCategory.innerHTML = def + options;

            window.renderCategoryManagementList();
        };

        const tempColorPalette = [
            'bg-amber-50 border-amber-200 text-amber-700',
            'bg-rose-50 border-rose-200 text-rose-700',
            'bg-emerald-50 border-emerald-200 text-emerald-700',
            'bg-sky-50 border-sky-200 text-sky-700',
            'bg-violet-50 border-violet-200 text-violet-700',
            'bg-orange-50 border-orange-200 text-orange-700',
            'bg-lime-50 border-lime-200 text-lime-700'
        ];

        window.renderCalendar = () => {
            if (!window.currentCalendarDate || !window.currentCalendarDate.format) {
                window.currentCalendarDate = dayjs();
            }

            const displayMonth = window.currentCalendarDate.format('YYYY-MM');
            const displayEl = document.getElementById('current-month-display');
            if (displayEl) displayEl.textContent = window.currentCalendarDate.format('YYYY년 M월');

            const monthlyData = (window.allLedgerData || []).filter(d => d.date && d.date.startsWith(displayMonth));
            
            window.categoriesSum = {};
            if (window.visibleCategories) {
                window.visibleCategories.forEach(cat => window.categoriesSum[cat.name] = []);
            }
            
            monthlyData.forEach(d => {
                if (!window.categoriesSum[d.category]) window.categoriesSum[d.category] = [];
                window.categoriesSum[d.category].push(d);
            });
            
            const sidebar = document.getElementById('category-container-sidebar');
            if (sidebar && window.visibleCategories) {
                sidebar.innerHTML = '';
                let totalMonthSum = 0;
                let tempColorIdx = 0;

                window.visibleCategories.forEach(cat => {
                    const items = window.categoriesSum[cat.name] || [];
                    const sum = items.reduce((acc, cur) => acc + (Number(cur.amount) || 0), 0);
                    totalMonthSum += sum;
                    
                    let colorClass = 'bg-white border-slate-100';
                    if (cat.isTemp) {
                        colorClass = tempColorPalette[tempColorIdx % tempColorPalette.length];
                        tempColorIdx++;
                    }

                    const div = document.createElement('div');
                    div.className = `p-4 border rounded-2xl flex justify-between items-center transition cursor-pointer hover:opacity-80 shadow-sm ${colorClass}`;
                    div.innerHTML = `
                        <span class="font-bold tracking-tight">
                            ${cat.name} 
                            <small class="opacity-50 ml-1">(${items.length})</small>
                        </span>
                        <span class="font-black text-indigo-600">${sum.toLocaleString()}원</span>`;
                    div.onclick = () => window.showCategoryDetail(cat.name, items);
                    sidebar.appendChild(div);
                });
                const totalSumEl = document.getElementById('total-sum');
                if (totalSumEl) totalSumEl.textContent = `${totalMonthSum.toLocaleString()} 원`;
            }
            window.renderLedgerList(monthlyData);

            const calendarDays = document.getElementById('calendar-days');
            if (calendarDays) {
                calendarDays.innerHTML = '';
                const startOfMonth = window.currentCalendarDate.startOf('month');
                const startDay = startOfMonth.day();
                const daysInMonth = window.currentCalendarDate.daysInMonth();

                for(let i=0; i<startDay; i++) {
                    calendarDays.innerHTML += `<div class="day-cell empty-cell"></div>`;
                }
                for(let i=1; i<=daysInMonth; i++) {
                    const dateStr = window.currentCalendarDate.date(i).format('YYYY-MM-DD');
                    const dayData = (window.allLedgerData || []).filter(d => d.date === dateStr);
                    const daySum = dayData.reduce((acc, cur) => acc + (Number(cur.amount)||0), 0);
                    const div = document.createElement('div');
                    div.className = `day-cell ${dateStr === dayjs().format('YYYY-MM-DD') ? 'is-today' : ''}`;
                    div.innerHTML = `<div class="date-number">${i}</div>` + (daySum > 0 ? `<div class="total-amount">${daySum.toLocaleString()}</div>` : '');
                    div.onclick = () => window.openDayModal(dateStr, dayData);
                    calendarDays.appendChild(div);
                }
            }
        };

        window.renderLedgerList = (data) => {
            const list = document.getElementById('general-ledger-list');
            if (!list) return;
            list.innerHTML = '';
            const sortedData = [...data].sort((a,b) => new Date(b.date) - new Date(a.date));
            sortedData.forEach(d => {
                const li = document.createElement('li');
                li.className = 'flex justify-between items-center p-3.5 bg-white rounded-2xl border border-slate-100 cursor-pointer hover:bg-slate-50 shadow-sm transition active:scale-[0.98]';
                li.innerHTML = `
                    <div class="flex-grow" onclick="window.openEditModal('${d.id}')">
                        <span class="text-[10px] bg-indigo-50 text-indigo-500 px-1.5 py-0.5 rounded-md mr-2 font-black uppercase">${d.category}</span>
                        <span class="text-sm font-bold text-slate-700">${d.item}</span> 
                        <span class="text-[10px] text-slate-400 ml-2 font-medium">${d.date.slice(5)}</span>
                    </div>
                    <div class="flex items-center">
                        <span class="font-black text-rose-500 mr-3" onclick="window.openEditModal('${d.id}')">${Number(d.amount).toLocaleString()}</span>
                        <button class="text-slate-300 hover:text-rose-500 p-1 text-lg leading-none" onclick="window.deleteEntry('${d.id}')">✕</button>
                    </div>
                `;
                list.appendChild(li);
            });
        };

        // --- 데이터 작업 ---
        window.addEntry = async (data) => {
            try {
                await window.addDoc(window.collection(db, window.SHARED_ENTRIES_PATH), { ...data, timestamp: new Date().toISOString() });
            } catch(e) { console.error(e); }
        };

        window.updateEntryData = async (id, data) => {
            try {
                await window.updateDoc(window.doc(db, window.SHARED_ENTRIES_PATH, id), data);
            } catch(e) { console.error(e); }
        };

        window.deleteEntry = async (id) => {
            if(!confirm('정말로 삭제하시겠습니까?')) return;
            try {
                await window.deleteDoc(window.doc(db, window.SHARED_ENTRIES_PATH, id));
            } catch(e) { console.error(e); }
        };

        window.addCategory = async (name, isTemp) => {
            if (!window.currentCalendarDate) window.currentCalendarDate = dayjs();
            const month = isTemp ? window.currentCalendarDate.format('YYYY-MM') : '';
            if(name && !window.categoryList.find(c => c.name === name && c.month === month)) {
                const newList = [...window.categoryList, { name, isTemp, month }];
                await window.setDoc(window.doc(db, window.SHARED_SETTINGS_PATH), { list: newList }, { merge: true });
            }
        };
        
        window.deleteCategory = async (name, month) => {
             if(!confirm('카테고리를 삭제하시겠습니까?')) return;
             const newList = window.categoryList.filter(c => !(c.name === name && c.month === month));
             await window.setDoc(window.doc(db, window.SHARED_SETTINGS_PATH), { list: newList }, { merge: true });
        };

        // --- UI 제어 ---
        window.openDayModal = (date, data) => {
            const title = document.getElementById('modal-date-title');
            const inputDate = document.getElementById('modal-gl-date');
            if (title) title.textContent = date;
            if (inputDate) inputDate.value = date;
            
            const list = document.getElementById('modal-detail-list');
            if (list) {
                list.innerHTML = '';
                let sum = 0;
                data.forEach(d => {
                    sum += Number(d.amount);
                    list.innerHTML += `
                        <li class="flex justify-between items-center p-3 border-b border-slate-50 hover:bg-slate-50 cursor-pointer transition">
                            <div class="flex-grow" onclick="window.openEditModal('${d.id}')">
                                <span class="text-slate-700 font-bold text-sm">${d.item}</span> 
                                <small class="text-slate-400 ml-1 font-medium">(${d.category})</small>
                            </div>
                            <div class="flex items-center">
                                <b class="text-rose-500 font-black" onclick="window.openEditModal('${d.id}')">${Number(d.amount).toLocaleString()}</b> 
                                <button onclick="window.deleteEntry('${d.id}')" class="ml-3 text-slate-300 hover:text-rose-600 text-lg">✕</button>
                            </div>
                        </li>`;
                });
                const totalSumEl = document.getElementById('modal-total-sum');
                if (totalSumEl) totalSumEl.textContent = `${sum.toLocaleString()} 원`;
            }
            document.getElementById('modal-backdrop').classList.remove('hidden');
            document.getElementById('modal-backdrop').classList.add('flex');
        };

        window.closeModal = () => {
            document.getElementById('modal-backdrop').classList.add('hidden');
            document.getElementById('modal-backdrop').classList.remove('flex');
        };

        window.openEditModal = (id) => {
            const entry = window.allLedgerData.find(d => d.id === id);
            if (!entry) return;
            document.getElementById('edit-entry-id').value = id;
            document.getElementById('edit-gl-date').value = entry.date;
            document.getElementById('edit-gl-category').value = entry.category;
            document.getElementById('edit-gl-item').value = entry.item;
            document.getElementById('edit-gl-amount').value = entry.amount;
            document.getElementById('edit-modal-backdrop').classList.remove('hidden');
            document.getElementById('edit-modal-backdrop').classList.add('flex');
        };

        window.closeEditModal = () => {
            document.getElementById('edit-modal-backdrop').classList.add('hidden');
            document.getElementById('edit-modal-backdrop').classList.remove('flex');
        };
        
        window.openCategoryManager = () => {
             window.renderCategoryManagementList();
             document.getElementById('category-management-ui').style.display = 'block';
             document.getElementById('category-detail-view').style.display = 'none';
             document.getElementById('category-modal-backdrop').classList.remove('hidden'); 
             document.getElementById('category-modal-backdrop').classList.add('flex');
        };
        
        window.closeCategoryModal = () => {
             document.getElementById('category-modal-backdrop').classList.add('hidden');
             document.getElementById('category-modal-backdrop').classList.remove('flex');
        };

        window.showCategoryDetail = (name, data) => {
            document.getElementById('category-management-ui').style.display = 'none';
            document.getElementById('category-detail-view').style.display = 'block';
            document.getElementById('category-detail-name').textContent = name + " 지출 내역";
            const list = document.getElementById('category-detail-list');
            list.innerHTML = data.map(d => `
                <li class="flex justify-between p-3 border-b border-slate-50 hover:bg-slate-50 cursor-pointer transition" onclick="window.openEditModal('${d.id}')">
                    <span><small class="text-slate-400 mr-2 font-medium">${d.date}</small><span class="font-bold text-slate-700">${d.item}</span></span>
                    <span class="font-black text-rose-500">${Number(d.amount).toLocaleString()}원</span>
                </li>`).join('');
            document.getElementById('category-modal-backdrop').classList.remove('hidden'); 
            document.getElementById('category-modal-backdrop').classList.add('flex');
        };
        
        window.renderCategoryManagementList = () => {
            const list = document.getElementById('existing-categories-list');
            if (list && window.categoryList) {
                let tempIdx = 0;
                list.innerHTML = window.categoryList.map(c => {
                    let colorClass = 'bg-white border-slate-100';
                    if (c.isTemp) {
                        colorClass = tempColorPalette[tempIdx % tempColorPalette.length];
                        tempIdx++;
                    }
                    return `
                    <div class="flex justify-between items-center p-3.5 border rounded-2xl mb-2 transition shadow-sm ${colorClass}">
                        <div>
                            <span class="font-black text-sm">${c.name}</span>
                            ${c.isTemp ? `<small class="ml-2 opacity-60 font-bold">[${c.month}]</small>` : ''}
                        </div>
                        <button onclick="window.deleteCategory('${c.name}', '${c.month}')" class="text-rose-400 hover:text-rose-600 font-black text-xs uppercase tracking-tighter">삭제</button>
                    </div>`;
                }).join('');
            }
        };

        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById('general-ledger-form').onsubmit = (e) => {
                e.preventDefault();
                const date = document.getElementById('gl-date').value;
                const cat = document.getElementById('gl-category').value;
                const item = document.getElementById('gl-item').value;
                const amount = document.getElementById('gl-amount').value;
                if(date && cat && item && amount) {
                    window.addEntry({ date, category: cat, item, amount: Number(amount) });
                    e.target.reset();
                    document.getElementById('gl-date').value = dayjs().format('YYYY-MM-DD');
                }
            };
            document.getElementById('modal-ledger-form').onsubmit = (e) => {
                e.preventDefault();
                const date = document.getElementById('modal-gl-date').value;
                const cat = document.getElementById('modal-gl-category').value;
                const item = document.getElementById('modal-gl-item').value;
                const amount = document.getElementById('modal-gl-amount').value;
                if(date && cat && item && amount) {
                    window.addEntry({ date, category: cat, item, amount: Number(amount) });
                    e.target.reset();
                    window.closeModal();
                }
            };
            document.getElementById('edit-ledger-form').onsubmit = (e) => {
                e.preventDefault();
                const id = document.getElementById('edit-entry-id').value;
                const date = document.getElementById('edit-gl-date').value;
                const cat = document.getElementById('edit-gl-category').value;
                const item = document.getElementById('edit-gl-item').value;
                const amount = document.getElementById('edit-gl-amount').value;
                if(id && date && cat && item && amount) {
                    window.updateEntryData(id, { date, category: cat, item, amount: Number(amount) });
                    window.closeEditModal();
                    window.closeModal();
                }
            };
            document.getElementById('add-category-form').onsubmit = (e) => {
                e.preventDefault();
                const val = document.getElementById('new-category-name').value.trim();
                const isTemp = document.getElementById('is-temp-category').checked;
                if(val) {
                    window.addCategory(val, isTemp);
                    document.getElementById('new-category-name').value = '';
                    document.getElementById('is-temp-category').checked = false;
                }
            };

            document.getElementById('prev-month-btn').onclick = () => { 
                window.currentCalendarDate = window.currentCalendarDate.subtract(1, 'month'); 
                window.updateCategoryUI();
                window.renderCalendar(); 
            };
            document.getElementById('next-month-btn').onclick = () => { 
                window.currentCalendarDate = window.currentCalendarDate.add(1, 'month'); 
                window.updateCategoryUI();
                window.renderCalendar(); 
            };

            document.getElementById('gl-date').value = dayjs().format('YYYY-MM-DD');
            window.initApp();
        });
    </script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@100..900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        .scroll-list::-webkit-scrollbar { width: 6px; }
        .scroll-list::-webkit-scrollbar-thumb { background-color: #e2e8f0; border-radius: 3px; }
        .scroll-list::-webkit-scrollbar-track { background: transparent; }
        input[type="number"]::-webkit-outer-spin-button, input[type="number"]::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        input[type="number"] { -moz-appearance: textfield; }

        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px; text-align: center; }
        .day-header { font-weight: bold; padding: 10px 0; font-size: 0.75rem; color: #94a3b8; text-transform: uppercase; letter-spacing: 0.05em; }
        .day-cell { padding: 6px; height: 90px; background-color: #fff; border-radius: 8px; cursor: pointer; border: 1px solid #f1f5f9; display: flex; flex-direction: column; align-items: flex-start; transition: all 0.2s; position: relative; }
        .day-cell:hover:not(.empty-cell) { background-color: #f1f5f9; border-color: #cbd5e1; transform: translateY(-1px); }
        .empty-cell { background-color: transparent; cursor: default; border: none; }
        .date-number { font-weight: 700; font-size: 0.8rem; color: #64748b; }
        .total-amount { font-size: 0.7rem; color: #f43f5e; font-weight: 800; width: 100%; text-align: right; margin-top: auto; }
        .is-today { border: 2px solid #6366f1; background-color: #eef2ff; }
        .is-today .date-number { color: #4338ca; }
        
        .modal-backdrop { display: none; }
        .modal-backdrop.flex { display: flex !important; }
    </style>
</head>
<body class="p-4 md:p-8 text-slate-800">

    <!-- 상세 내역 모달 -->
    <div id="modal-backdrop" class="modal-backdrop fixed inset-0 bg-slate-900/60 backdrop-blur-sm items-center justify-center z-50">
        <div class="bg-white rounded-2xl shadow-2xl w-full max-w-lg mx-4 overflow-hidden border border-slate-200" onclick="event.stopPropagation()">
            <div class="p-6">
                <div class="flex justify-between items-center mb-6">
                    <h3 id="modal-date-title" class="text-2xl font-black text-slate-800 tracking-tight"></h3>
                    <button onclick="closeModal()" class="text-slate-400 hover:text-slate-600 transition p-1 text-2xl leading-none">✕</button>
                </div>
                <form id="modal-ledger-form" class="space-y-4 mb-8 p-5 bg-slate-50 rounded-xl border border-slate-100 shadow-inner">
                    <input type="hidden" id="modal-gl-date">
                    <div class="grid grid-cols-2 gap-3">
                        <select id="modal-gl-category" required class="w-full p-2.5 bg-white border border-slate-200 rounded-lg text-sm font-bold focus:ring-2 focus:ring-indigo-500 outline-none"></select>
                        <input type="number" id="modal-gl-amount" placeholder="금액" required class="w-full p-2.5 bg-white border border-slate-200 rounded-lg text-sm font-bold focus:ring-2 focus:ring-indigo-500 outline-none">
                    </div>
                    <input type="text" id="modal-gl-item" placeholder="지출 내용" required class="w-full p-2.5 bg-white border border-slate-200 rounded-lg text-sm font-bold focus:ring-2 focus:ring-indigo-500 outline-none">
                    <button type="submit" class="w-full bg-indigo-600 text-white p-3 rounded-lg hover:bg-indigo-700 font-bold text-sm shadow-md transition transform active:scale-95">내역 추가</button>
                </form>
                <div class="flex items-center justify-between mb-3 px-1">
                    <h4 class="text-xs font-black text-slate-400 uppercase tracking-widest">상세 항목</h4>
                    <span id="modal-total-sum" class="text-lg font-black text-indigo-600"></span>
                </div>
                <ul id="modal-detail-list" class="max-h-60 overflow-y-auto space-y-1 scroll-list pr-1"></ul>
            </div>
        </div>
    </div>

    <!-- 수정 모달 -->
    <div id="edit-modal-backdrop" class="modal-backdrop fixed inset-0 bg-slate-900/60 backdrop-blur-sm items-center justify-center z-[60]">
        <div class="bg-white rounded-2xl shadow-2xl w-full max-w-md mx-4 overflow-hidden border border-slate-200" onclick="event.stopPropagation()">
            <div class="p-7">
                <div class="flex justify-between items-center mb-6">
                    <h3 class="text-xl font-black text-slate-800 tracking-tight">항목 수정</h3>
                    <button onclick="closeEditModal()" class="text-slate-400 hover:text-slate-600 transition p-1 text-2xl leading-none">✕</button>
                </div>
                <form id="edit-ledger-form" class="space-y-5">
                    <input type="hidden" id="edit-entry-id">
                    <div>
                        <label class="block text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1.5 ml-1">지출 날짜</label>
                        <input type="date" id="edit-gl-date" required class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl text-sm font-bold focus:ring-2 focus:ring-indigo-500 outline-none">
                    </div>
                    <div>
                        <label class="block text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1.5 ml-1">카테고리</label>
                        <select id="edit-gl-category" required class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl text-sm font-bold focus:ring-2 focus:ring-indigo-500 outline-none"></select>
                    </div>
                    <div>
                        <label class="block text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1.5 ml-1">항목명</label>
                        <input type="text" id="edit-gl-item" required class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl text-sm font-bold focus:ring-2 focus:ring-indigo-500 outline-none">
                    </div>
                    <div>
                        <label class="block text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1.5 ml-1">금액</label>
                        <input type="number" id="edit-gl-amount" required class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl text-sm font-bold focus:ring-2 focus:ring-indigo-500 outline-none">
                    </div>
                    <div class="flex space-x-3 pt-2">
                        <button type="button" onclick="closeEditModal()" class="flex-1 bg-slate-100 text-slate-600 p-3.5 rounded-xl font-bold text-sm hover:bg-slate-200 transition">취소</button>
                        <button type="submit" class="flex-1 bg-indigo-600 text-white p-3.5 rounded-xl font-bold text-sm hover:bg-indigo-700 shadow-lg transition transform active:scale-95">저장하기</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
    
    <!-- 카테고리 관리 모달 -->
    <div id="category-modal-backdrop" class="modal-backdrop fixed inset-0 bg-slate-900/60 backdrop-blur-sm items-center justify-center z-50">
        <div class="bg-white rounded-2xl shadow-2xl w-full max-w-lg mx-4 overflow-hidden border border-slate-200" onclick="event.stopPropagation()">
            <div class="p-7">
                <div class="flex justify-between items-center mb-6">
                    <h3 id="category-modal-title" class="text-xl font-black text-slate-800 tracking-tight">카테고리 관리</h3>
                    <button onclick="closeCategoryModal()" class="text-slate-400 hover:text-slate-600 transition p-1 text-2xl leading-none">✕</button>
                </div>
                <div id="category-management-ui" class="space-y-6">
                    <form id="add-category-form" class="space-y-4 p-5 bg-slate-50 rounded-xl border border-slate-100 shadow-inner">
                        <div class="flex space-x-2">
                            <input type="text" id="new-category-name" placeholder="카테고리 이름" required class="flex-grow p-3 bg-white border border-slate-200 rounded-lg text-sm font-bold focus:ring-2 focus:ring-indigo-500 outline-none">
                            <button type="submit" class="bg-blue-600 text-white px-5 rounded-lg hover:bg-blue-700 font-bold text-sm transition transform active:scale-95 shadow-md">추가</button>
                        </div>
                        <div class="flex items-center space-x-2.5 px-1">
                            <input type="checkbox" id="is-temp-category" class="w-5 h-5 text-amber-500 border-slate-300 rounded-md focus:ring-amber-500 cursor-pointer transition">
                            <label for="is-temp-category" class="text-xs font-black text-amber-700 cursor-pointer">이번 달만 임시로 사용하기</label>
                        </div>
                    </form>
                    <div>
                        <h4 class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-3 ml-1">등록된 목록</h4>
                        <div id="existing-categories-list" class="space-y-2 max-h-60 overflow-y-auto scroll-list pr-1"></div>
                    </div>
                </div>
                <div id="category-detail-view" style="display:none;">
                    <h4 id="category-detail-name" class="font-black text-indigo-600 text-lg mb-4 tracking-tight"></h4>
                    <ul id="category-detail-list" class="max-h-80 overflow-y-auto space-y-2 scroll-list pr-1"></ul>
                </div>
            </div>
        </div>
    </div>

    <!-- 상단 상태바 -->
    <div class="bg-slate-900 text-white text-[10px] p-2 px-6 fixed top-0 left-0 right-0 z-[100] flex justify-between items-center font-bold tracking-tighter opacity-90">
        <div class="flex items-center space-x-2">
            <span id="sync-status" class="text-yellow-400 uppercase font-black">동기화 대기 중...</span>
        </div>
        <div class="flex items-center space-x-1 opacity-50">
            <span>모드:</span>
            <span id="user-id">...</span>
        </div>
    </div>

    <div class="max-w-7xl mx-auto pt-10 px-2">
        <!-- 메인 제목 기울기 제거 -->
        <h1 class="text-3xl md:text-5xl font-black text-slate-900 mt-8 mb-10 text-center tracking-tighter">나의 똑똑한 가계부</h1>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8 items-start">
            <!-- [좌측] 등록 및 요약 -->
            <div class="lg:col-span-1 space-y-8">
                <div class="bg-white p-7 rounded-3xl shadow-xl border border-slate-100">
                    <h2 class="text-lg font-black text-indigo-600 mb-6 flex items-center">
                        <span class="mr-2">01.</span> 지출 등록
                    </h2>
                    <form id="general-ledger-form" class="space-y-4">
                        <div class="space-y-1">
                            <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1">날짜</label>
                            <input type="date" id="gl-date" required class="w-full p-3.5 bg-slate-50 border border-slate-100 rounded-2xl text-sm font-bold outline-none focus:ring-2 focus:ring-indigo-500">
                        </div>
                        <div class="space-y-1">
                            <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1">카테고리</label>
                            <select id="gl-category" required class="w-full p-3.5 bg-slate-50 border border-slate-100 rounded-2xl text-sm font-bold outline-none focus:ring-2 focus:ring-indigo-500"></select>
                        </div>
                        <div class="space-y-1">
                            <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1">내용</label>
                            <input type="text" id="gl-item" placeholder="지출 내용 입력" required class="w-full p-3.5 bg-slate-50 border border-slate-100 rounded-2xl text-sm font-bold outline-none focus:ring-2 focus:ring-indigo-500">
                        </div>
                        <div class="space-y-1 pb-2">
                            <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1">금액</label>
                            <input type="number" id="gl-amount" placeholder="금액 입력" required class="w-full p-3.5 bg-slate-50 border border-slate-100 rounded-2xl text-sm font-bold outline-none focus:ring-2 focus:ring-indigo-500">
                        </div>
                        <button type="submit" id="submit-btn" class="w-full bg-indigo-600 text-white p-4 rounded-2xl hover:bg-indigo-700 font-black text-sm shadow-lg shadow-indigo-200 transition transform active:scale-95 disabled:opacity-50" disabled>기록 저장하기</button>
                    </form>
                </div>

                <div class="bg-white p-7 rounded-3xl shadow-xl border border-slate-100">
                    <div class="flex justify-between items-center mb-6">
                        <h2 class="text-lg font-black text-indigo-600 flex items-center">
                            <span class="mr-2">02.</span> 카테고리 요약
                        </h2>
                        <button onclick="window.openCategoryManager()" class="text-[10px] font-black text-indigo-400 bg-indigo-50 px-2 py-1 rounded-md hover:bg-indigo-100 uppercase">설정</button>
                    </div>
                    <div id="category-container-sidebar" class="space-y-3">
                        <p class="text-center text-slate-300 text-xs py-10 font-bold">로딩 중...</p>
                    </div>
                </div>
            </div>

            <!-- [우측] 달력 및 전체 목록 -->
            <div class="lg:col-span-2 space-y-8">
                <div class="bg-white p-8 rounded-3xl shadow-xl border border-slate-100">
                    <div class="flex flex-col md:flex-row justify-between items-center mb-8 gap-4">
                        <div class="flex items-center space-x-5">
                            <button id="prev-month-btn" class="w-10 h-10 flex items-center justify-center text-slate-400 hover:text-indigo-600 hover:bg-indigo-50 font-black text-2xl rounded-full transition">&lt;</button>
                            <h3 id="current-month-display" class="text-3xl font-black text-slate-900 tracking-tighter min-w-[150px] text-center"></h3>
                            <button id="next-month-btn" class="w-10 h-10 flex items-center justify-center text-slate-400 hover:text-indigo-600 hover:bg-indigo-50 font-black text-2xl rounded-full transition">&gt;</button>
                        </div>
                        <div class="bg-indigo-600 p-4 px-7 rounded-2xl text-white shadow-xl shadow-indigo-100 flex flex-col items-end">
                            <!-- 요약 텍스트 기울기 제거 -->
                            <span class="text-[10px] font-black uppercase tracking-widest opacity-80 mb-0.5">이번 달 총 합계</span>
                            <span id="total-sum" class="text-2xl font-black tabular-nums">0 원</span>
                        </div>
                    </div>

                    <!-- 달력 요일 기울기 제거 -->
                    <div class="calendar-grid mb-2 border-b border-slate-50 pb-2 font-black">
                        <div class="day-header text-rose-500">일</div>
                        <div class="day-header">월</div><div class="day-header">화</div><div class="day-header">수</div><div class="day-header">목</div><div class="day-header">금</div>
                        <div class="day-header text-sky-500">토</div>
                    </div>
                    <div id="calendar-days" class="calendar-grid mb-10"></div>

                    <div class="flex items-center mb-5 ml-1">
                        <div class="w-2 h-6 bg-indigo-600 rounded-full mr-3 shadow-md shadow-indigo-200"></div>
                        <!-- 클릭 수정 안내 문구 기울기 제거 -->
                        <h3 class="text-xl font-black text-slate-800 tracking-tight">전체 지출 내역 <span class="text-slate-300 font-bold text-sm ml-2">클릭하여 수정</span></h3>
                    </div>
                    <ul id="general-ledger-list" class="space-y-3 max-h-96 overflow-y-auto scroll-list pr-2"></ul>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
